# Netlify deploy config for Bug Whisperer frontend

[build]
  command = "cd frontend && bun install && bun run build"
  publish = "frontend/.next"

[build.environment]
  BUN_VERSION = "1.3.14"
  NEXT_PUBLIC_API_URL = "https://backend-production-efdc.up.railway.app"

[[plugins]]
  package = "@netlify/plugin-nextjs"
